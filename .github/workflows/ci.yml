name: CI
run-name: ArgoCD Setting Up

on:
  push:
    branches:
      - main
  pull_request: 
    branches: 
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ github.sha }}    # ← truyền tag sang job sau

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # Job mới: cập nhật GitOps repo
  # ─────────────────────────────────────────
  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: whtbl3/github-action-argocd-gitops  # ← GitOps repo
          token: ${{ secrets.GITOPS_TOKEN }}               # ← PAT cần tạo
          path: gitops

      - name: Update staging image tag
        run: |
          cd gitops
          sed -i "s|newTag:.*|newTag: \"${{ github.sha }}\"|" \
            overlays/staging/kustomization.yaml

      - name: Commit and push
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/staging/kustomization.yaml
          git commit -m "chore: update staging image to ${{ github.sha }}"
          git push